name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact_base: ${{ steps.meta.outputs.artifact_base }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Resolve version metadata
        id: meta
        shell: pwsh
        run: |
          $version = (python scripts/version.py show).Trim()
          "version=$version" >> $env:GITHUB_OUTPUT
          "artifact_base=TunnelSpot-v$version-windows-x64" >> $env:GITHUB_OUTPUT

      - name: Validate tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $expected = "v${{ steps.meta.outputs.version }}"
          if ("${{ github.ref_name }}" -ne $expected) {
            throw "Tag '${{ github.ref_name }}' does not match project version '$expected'."
          }

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Build executable
        shell: pwsh
        run: |
          if (Test-Path .venv) { Remove-Item -LiteralPath .venv -Recurse -Force }
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e .[dev]
          .\scripts\build_exe.ps1

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_base }}
          path: |
            release/${{ steps.meta.outputs.artifact_base }}.exe
            release/${{ steps.meta.outputs.artifact_base }}.zip
            release/${{ steps.meta.outputs.artifact_base }}.sha256
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: build-windows
    permissions:
      contents: write
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build-windows.outputs.artifact_base }}
          path: release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build-windows.outputs.version }}
          name: TunnelSpot v${{ needs.build-windows.outputs.version }}
          body: |
            TunnelSpot ${{ needs.build-windows.outputs.version }}

            Artifacts:
            - ${{ needs.build-windows.outputs.artifact_base }}.exe
            - ${{ needs.build-windows.outputs.artifact_base }}.zip
            - ${{ needs.build-windows.outputs.artifact_base }}.sha256

            Build:
            - OS: windows-latest
            - Python: 3.13
            - Commit: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release/${{ needs.build-windows.outputs.artifact_base }}.exe
            release/${{ needs.build-windows.outputs.artifact_base }}.zip
            release/${{ needs.build-windows.outputs.artifact_base }}.sha256
